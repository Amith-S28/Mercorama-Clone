# Mercorama — Nginx config for EasyEngine nginx-proxy (Docker)
#
# Install on server:
#   cp scripts/nginx.conf /var/lib/docker/volumes/global-nginx-proxy_confd/_data/mercorama.conf
#   docker exec services_global-nginx-proxy_1 nginx -s reload
#
# The Next.js PM2 process runs on the host at port 3000.
# Docker host gateway is 10.0.0.1, used to reach PM2 from inside the proxy container.

# ── HTTP: ACME challenge + redirect to HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name mercorama.com www.mercorama.com;

    # Let's Encrypt webroot challenge (served from EasyEngine HTML volume)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: proxy to PM2 on host ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name mercorama.com www.mercorama.com;

    # SSL — certs placed by ssl-setup.sh
    ssl_certificate     /etc/nginx/certs/mercorama.com.crt;
    ssl_certificate_key /etc/nginx/certs/mercorama.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_vary on;

    # Next.js immutable static assets — long cache
    location /_next/static/ {
        proxy_pass http://10.1.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header       Cache-Control     "public, max-age=31536000, immutable";
        access_log off;
    }

    # All other requests → PM2 Next.js process
    location / {
        proxy_pass         http://10.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
